pipeline:
  queue_max_size: 20000
  metrics_interval_sec: 5
  sqlite_commit_batch_size: 1
  replay_delay_ms: 0
  live_capture_backend: auto
  live_capture_tcpdump_bin: tcpdump
  live_capture_tcpdump_snaplen: 0
  live_capture_bpf_filter: ""

detection:
  dos_packets_per_sec_threshold: 240
  dos_rearm_ratio: 0.7
  dos_episode_timeout_sec: 30
  scan_ports_threshold: 25
  scan_window_sec: 12
  ssh_bruteforce_threshold: 10
  ssh_bruteforce_window_sec: 12
  rdp_bruteforce_threshold: 10
  rdp_bruteforce_window_sec: 12
  http_login_threshold: 8
  http_login_window_sec: 20
  zscore_enabled: true
  zscore_threshold: 3.0
  anomaly_cooldown_sec: 8
  suppress_window_sec: 15

ml:
  model_path: models/model.pkl
  score_threshold: 0.85
  live_throttle_enabled: true
  live_min_inference_interval_sec: 1.0
  unsupervised: false
  unsupervised_warmup_samples: 200
  unsupervised_contamination: 0.03
  unsupervised_alert_threshold: 0.65
  unsupervised_component_threshold: 0.55
  unsupervised_confirmation_hits: 1
  unsupervised_rearm_score_ratio: 0.85
  unsupervised_episode_timeout_sec: 30
  unsupervised_autoencoder: true
  unsupervised_autoencoder_hidden_size: 8
  unsupervised_autoencoder_max_iter: 400
  unsupervised_persist_baseline: true
  unsupervised_baseline_path: /data/runtime/output/unsupervised_baseline.pkl

fusion:
  enabled: true
  emit_alerts: true
  emit_on_signature_only: false
  min_component_score: 0.55
  min_agreement_count: 2
  alert_threshold: 0.65
  high_threshold: 0.8
  critical_threshold: 0.92
  signature_weight: 0.4
  statistical_weight: 0.2
  supervised_weight: 0.3
  unsupervised_weight: 0.1

adapters:
  suricata:
    enabled: false
    path: /data/replay/staging/suricata_eve.jsonl
  zeek:
    enabled: false
    path: /data/replay/staging/zeek_conn.jsonl

detectors:
  campaign_behavior:
    enabled: false
    window_sec: 180
    alert_cooldown_sec: 120
    distributed_scan_min_sources: 3
    distributed_scan_min_ports: 12
    coordinated_probe_min_sources: 3
    coordinated_probe_min_targets: 4
  exfiltration_behavior:
    enabled: false
    alert_cooldown_sec: 120
    dns_entropy_threshold: 4.1
    dns_min_label_length: 18
    long_subdomain_threshold: 45
    timing_window_sec: 240
    timing_min_events: 6
    timing_min_interval_sec: 0.5
    timing_max_cv: 0.12
    timing_small_payload_max_bytes: 220
    outbound_window_sec: 180
    outbound_min_events: 12
    outbound_min_distinct_destinations: 3
    outbound_dominant_ratio: 0.8
    outbound_max_avg_payload: 220

threat_intel:
  enabled: false
  indicators_path: ""
  inline_indicators: []
  cache_path: /data/runtime/output/threat_intel_cache.json
  cache_ttl_sec: 3600
  emit_match_alerts: true
  src_enabled: true
  dst_enabled: true
  cooldown_sec: 300
  severity: high

artifacts:
  incoming_path: /data/runtime/artifacts/incoming
  processed_path: /data/runtime/artifacts/processed
  quarantine_path: /data/runtime/artifacts/quarantine
  jsonl_path: /data/runtime/output/artifacts.jsonl
  db_path: /data/runtime/output/nids.db
  max_text_chars: 20000
  watch_interval_sec: 5
  zip_limits:
    max_files: 5000
    max_uncompressed_bytes: 1000000000

maintenance:
  enabled: false
  retention_days: 30
  interval_hours: 24
  include_artifacts: false
  vacuum: false

notifications:
  enabled: false
  slack_webhook: ""
  min_severity: high
  timeout_sec: 3
  max_retries: 2
  backoff_sec: 0.5
  max_backoff_sec: 4.0
  min_interval_sec: 0.1
  dead_letter_path: /data/runtime/logs/notification_failures.jsonl
  dead_letter_max_bytes: 10485760
  dead_letter_backup_count: 5
