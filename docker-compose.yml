services:
  nids-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nids-runtime
    restart: unless-stopped
    env_file:
      - .env
    command: ["sh", "/app/scripts/run_runtime_container.sh"]
    volumes:
      - ./output:/app/output
      - ./reports:/app/reports
      - ./pcaps:/app/pcaps:ro
      - ./rules:/app/rules:ro
      - ./config:/app/config:ro
      - ./artifacts:/app/artifacts
    cap_add:
      - NET_ADMIN
      - NET_RAW

  nids-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nids-dashboard
    restart: unless-stopped
    depends_on:
      - nids-runtime
    env_file:
      - .env
    command: ["sh", "/app/scripts/run_dashboard_container.sh"]
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
    volumes:
      - ./output:/app/output
      - ./reports:/app/reports
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz').status == 200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
